<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./pics/profile-pic.png">
    <title>AJ Tekniko - Videos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: auto;
            height: 100vh;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        .stars{
            width: 2px;
            height: 2px;
            background: white;
            position: absolute;
            box-shadow: 50px 100px white, 130px 80px white, 180px 200px white,
                300px 150px white, 400px 90px white, 500px 180px white,
                600px 130px white, 700px 220px white, 800px 170px white,
                150px 300px white, 250px 270px white, 370px 310px white,
                520px 350px white, 620px 390px white, 720px 430px white,
                900px 40px white, 800px 300px white, 75px 430px white,
                975px 250px white, 1050px 140px white, 1150px 300px white,
                1250px 60px white;
            animation: twinkle 2s infinite ease-in-out alternate;
        }
        
        @keyframes twinkle {
            0%{opacity: 0.3;}
            100%{opacity: 1;}
        }

        .header {
            text-align: center;
            margin: 20px;
            overflow: hidden;
        }

        h1 {
            font-size: 2em;
            margin-top: 20px;
            text-shadow: 0 0 20px #00ff00;
            color: #00ff00;
        }

        .profile {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 75px;
            border: 5px solid #00ff00;
            margin: 20px auto;
            background-image: url('./pics/profile-pic.png');
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 13px #00ff00;
        }

        nav {
            display: flex;
            justify-content: center;
            margin: 20px 0 5px;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            background: linear-gradient(
            90deg, #454545 0%,
                   #828282 25%,
                   #999999 50%,
                   #828282 75%,
                   #454545 100%
            );
            color: #fff;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
        }

        nav ul li a:hover {
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ff00;
        }

        nav ul li a:active {
            background: linear-gradient(
            90deg, #343434 0%,
                   #717171 25%,
                   #888888 50%,
                   #717171 75%,
                   #343434 100%
            );
            color: #000;
        }

        .outer-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            position: relative;
            width: 60%;
            height: 52%;
            color: #fff;
            background-color: #222;
            padding: 20px;
        }

        .image-text {
            width: 22%;
            float: left;
            text-align: center;
            margin: 20px 1.5%;

        }

        .image-text img { 
            width: 100px;
            height: 100px;
        }

        .img-links {
            margin-bottom: 10px;           
        }

        .img-links:hover {
            color: #000;
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ff00;
        }

        .img-links:active {
            filter: brightness(50%);
        }


        @media screen and (max-width: 875px) {
            .container {
                width: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
        }        
    </style>
</head>
<body>
    <div class="stars">
    </div>
    <div class="header">
        <h1>AJ Tekniko</h1>
        </div>
    <div class="profile"></div>
    <nav>
        <ul>

            <li><a href="./videos.html">Videos</a></li>

            <li><a href="./games.html">Games</a></li>
            <li><a href="mailto:artworkj@proton.me">Contact</a></li>
        </ul>
    </nav>

            <p>Python</p>
        </div>
        <div class="image-text">
            <a href="https://www.youtube.com/playlist?list=PL0JRV81am7fS6TBZVBs-Ai0IvhrbQQcbp"><img class="img-links" src="./pics/go-logo.png" alt="Golang gopher with a game controller by Egon Elbre"></a>
            <p>Go</p>
        </div>
        <div class="image-text">

            <p>JavaScript</p>
        </div>
        <div class="image-text">
            <a href="https://www.youtube.com/playlist?list=PL0JRV81am7fQ8QFRbg-n4chsfh5XfHog0"><img class="img-links" src="./pics/css-logo.png" alt="CSS logo"></a>
            <p>CSS</p>
        </div>

    </div>
    </div>
</body>
</html>
