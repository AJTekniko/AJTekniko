<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./pics/profile-pic.png">
    <title>Page Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            color: #00ff00;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .img-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        img {
            margin: 0 20px;
            width: 150px;
            height: 150px;
        }
        
        #flipped {
            transform: scaleX(-1);
        }

        h1 {
            margin-top: 30px;
            color: #fff;
        }
        
    </style>
</head>
<body>
    <h1>Page under construction<h1>
    <div class="img-container">
        <img src="./pics/uc1.png" alt="Barrier">
        <img src="./pics/uc2.png" alt="Penguin on phone">
        <img id="flipped" src="./pics/uc1.png" alt="Barrier">
    </div>
</body>
</html>
